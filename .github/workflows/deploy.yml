name: Build and Deploy SummitCorporate

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/summit-corporate:latest .

      - name: Push Docker image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/summit-corporate:latest

      - name: Deploy to Linux Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd /opt/marai-ui-docs

            docker compose pull summit-corporate

            docker compose up -d --force-recreate summit-corporate

            docker image prune -f